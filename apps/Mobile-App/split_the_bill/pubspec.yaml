name: equishare
description: BillCompass mobile app — split bills with friends and groups.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_slidable: ^3.1.2
  url_launcher: ^6.3.2
  flutter_markdown_plus: ^1.0.12
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/equishare_logo_mobile.png
  web:
    generate: true
  macos:
    generate: true
  windows:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/equishare_logo_mobile.png
    - assets/equishare_logo_inverted.png
    - assets/privacy_policy.md
    - assets/terms_of_service.md
    - google_fonts/
